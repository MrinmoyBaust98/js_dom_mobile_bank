<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <!-- daisyui CDN-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <!-- tailwind cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font assome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="w-xl mx-auto ">
    <main class="bg-[#F4F5F7] w-full   p-8 ">
        <!-- home banner Section -->
        <section class="flex justify-between items-center my-5">
            <div class="  flex items-center ">
                <div class="w-[50px] h-[48px]">
                    <img src="assets/Group.png" alt="">
                </div>
                <div class="p-4">
                    <h2 class="font-extrabold text-lg text-[#080808]">$ <span id="total-blance">4500</span></h2>
                    <p class="font-normal text-xm text-[#080808]">Available Balance</p>

                </div>

            </div>

            <button class="btn btn-outline text-[#080808] font-normal"> Logout <span><i
                        class="fa-solid fa-arrow-right-from-bracket"></i></span></button>
        </section>
        <hr>

        <!-- feature Section -->
        <section class="mt-[60px]">
            <div class="feature_heading">
                <h1 class="font-extrabold text-2xl text-[#080808]">🔥 Welcome to Payooo!</h1>
                <p class="font-normal text-base text-[rgba(8,8,8,0.61)] my-2">Enjoy easy and convenient financial
                    services with
                    us.
                    <br>
                    Cashout charge is low and unlimitted copuns.
                </p>
            </div>
            <div class="freture_cards grid grid-cols-3 grid-rows-2 gap-3 pt-6">
                <div class=" w-[1/3] h-[90px] flex flex-col justify-center items-center bg-white rounded-xl">
                    <img class="w-[24px] h-[24px]" src="assets/wallet1.png" alt="">
                    <h2 class="text-[#080808b3] font-medium text-base">Add Money</h2>
                </div>

                <div class="w-[1/3] h-[90px] flex flex-col justify-center items-center bg-white rounded-xl">
                    <img class="w-[24px] h-[24px]" src="assets/send1.png" alt="">
                    <h2 class="text-[#080808b3] font-medium text-base">Cashout</h2>
                </div>

                <div class="w-[1/3] h-[90px] flex flex-col justify-center items-center bg-white rounded-xl">
                    <img class="w-[24px] h-[24px]" src="assets/money1.png" alt="">
                    <h2 class="text-[#080808b3] font-medium text-base">Transfer Money</h2>
                </div>

                <div class="w-[1/3] h-[90px] flex flex-col justify-center items-center bg-white rounded-xl">
                    <img class="w-[24px] h-[24px]" src="assets/bonus1.png" alt="">
                    <h2 class="text-[#080808b3] font-medium text-base">Get Bonus</h2>
                </div>

                <div class="w-[1/3] h-[90px] flex flex-col justify-center items-center bg-white rounded-xl">
                    <img class="w-[24px] h-[24px]" src="assets/purse1.png" alt="">
                    <h2 class="text-[#080808b3] font-medium text-base">Pay Bill</h2>
                </div>

                <div class="w-[1/3] h-[90px] flex flex-col justify-center items-center bg-white rounded-xl">
                    <img class="w-[24px] h-[24px]" src="assets/transaction1.png" alt="">
                    <h2 class="text-[#080808b3] font-medium text-base">Transactions</h2>
                </div>

            </div>

        </section>

        <!-- all form section here -->
        <!-- add money section -->
        <section class="my-6">
            <h1 class="all-form text-[#080808e6] font-semibold text-lg mb-3">Add Money</h1>
            <form class="">
                <div class="bg-white p-8 rounded-xl w-full">
                    <label class="font-medium text-base text-[#080808e6]">Select A Bank</label>
                    <br>
                    <select id="add-bank" class="select select-neutral my-3 rounded-2xl w-full">
                        <option disabled selected>Select back</option>
                        <option>DBBL</option>
                        <option>AB Bank</option>
                        <option>NRBC Bank</option>
                    </select>
                    <br>

                    <label class="font-medium text-base text-[#080808e6]" for="">Bank Account Number</label>
                    <br>
                    <input id="add-account" class="my-3 rounded-2xl w-full input" type="text"
                        placeholder="Enter 11 digit account number" />
                    <br>

                    <label class="font-medium text-base text-[#080808e6]" for="">Amount to Add</label>
                    <br>
                    <input id="add-amount" class="my-3 rounded-2xl w-full input" type="text"
                        placeholder="Add Amount to withdraw" />
                    <br>

                    <label class="font-medium text-base text-[#080808e6]" for="">Pin Number</label>
                    <br>
                    <input id="add-pin" class="my-3 rounded-2xl w-full input" type="text"
                        placeholder="Enter 4 digit pin number" />
                    <br>

                    <button id="btn-add-money" class="btn bg-[#0874F2] rounded-2xl w-full h-[52px] mt-6 text-white">Add
                        Money</button>
                </div>

            </form>
        </section>

    </main>

    <!-- js File Add -->
    <script src="js/home.js"></script>
</body>

</html>
